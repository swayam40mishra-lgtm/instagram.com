<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="your-photo.jpg" alt="Profile Photo" class="logo">

    <input
        type="text"
        class="input-box"
        placeholder="Phone number, username or email"
    >

    <input
        type="password"
        class="input-box"
        placeholder="Password"
    >

    <button class="login-btn">
        Log In
    </button>

    <a href="#" class="forgot">
        Forgot password?
    </a>

    <div class="divider">
        <span>OR</span>
    </div>

    <a href="#" class="create-account">
        Create New Account
    </a>

    <div class="footer">
        <p>Language • Privacy • Terms • Help</p>
        <p>© Swayam Mishra</p>
    </div>

</div>

<!-- JavaScript File -->
<script src="script.js"></script>

</body>
</html>
